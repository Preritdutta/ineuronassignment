<body>
    <input type="number" name="Enter a year" id="year"/>
    <button onclick="isLeapYear()" >Check</button>
    <p id="viewoutput"></p>
    <script>
        function isLeapYear() {
            year=document.getElementById("year").value;   
     if(year % 100 === 0)
     {
           let leap;
           leap=year % 400;
           if(leap===0){
           alert("it is a leap year");
     }
         else{
           
           alert("it is not a leap year");
     }}
     else
         if(year % 4 ===0)
     {
       alert("It is a leap yer");
     }
       else{
       alert("It is not a leap year");
          }
        
          document.getElementById("viewoutput").innerHTML;
     }
 
          
         


    </script>
</body>
